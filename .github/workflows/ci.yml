name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Syntax & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: JS Syntax Check (node --check)
        run: |
          FAILED=0
          for f in src/*.js sw.js; do
            if ! node --check "$f" 2>&1; then
              echo "SYNTAX ERROR: $f"
              FAILED=1
            fi
          done
          exit $FAILED

      - name: Unit Tests
        run: node src/sleep.test.js

  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start dev server
        run: npx serve . -p 5000 &
        env:
          CI: true

      - name: Wait for server
        run: npx wait-on http://localhost:5000 --timeout 15000

      - name: Run E2E tests
        run: npx playwright test --reporter=github
        env:
          BASE_URL: http://localhost:5000
